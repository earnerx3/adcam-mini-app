<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PromoHub - My Profile</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root {
            --bg-color: #05050A;
            --primary: #00F2FE;
            --secondary: #4FACFE;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(79, 172, 254, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(161, 140, 209, 0.08) 0%, transparent 50%);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .text-gradient {
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tab-btn.active {
            color: #00F2FE;
            border-bottom: 2px solid #00F2FE;
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-32 px-5 pt-8 opacity-0 transition-opacity duration-500" id="profile-body">

    <div class="flex flex-col items-center mb-8">
        <div class="relative w-24 h-24 mb-4">
            <div class="absolute inset-0 bg-gradient-to-tr from-cyan-500 to-blue-600 rounded-full animate-pulse blur-md opacity-50"></div>
            <div class="relative w-full h-full rounded-full bg-gradient-to-tr from-cyan-500 to-blue-600 p-[2px]">
                <img id="prof-avatar" src="" class="w-full h-full rounded-full bg-[#05050A] object-cover">
            </div>
        </div>
        <h2 id="prof-name" class="text-2xl font-extrabold text-white mb-1">Loading...</h2>
        <p id="prof-username" class="text-gray-400 text-sm mb-4">@username</p>
        
        <div class="flex gap-4">
            <div class="glass-card px-5 py-3 rounded-2xl text-center">
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider mb-1">Balance</p>
                <div class="flex items-center gap-1.5 justify-center">
                    <i class="ph-fill ph-coin text-yellow-400 text-lg"></i>
                    <span id="prof-balance" class="text-xl font-extrabold text-white">0</span>
                </div>
            </div>
            <div class="glass-card px-5 py-3 rounded-2xl text-center">
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider mb-1">Level</p>
                <div class="flex items-center gap-1.5 justify-center">
                    <i class="ph-fill ph-star text-cyan-400 text-lg"></i>
                    <span id="prof-level" class="text-xl font-extrabold text-white">1</span>
                </div>
            </div>
        </div>
    </div>

    <div class="mb-6">
        <div class="flex border-b border-white/5 mb-6">
            <button id="tab-campaigns" onclick="switchTab('my-campaigns')" class="tab-btn flex-1 py-3 text-sm font-bold active transition-all">My Campaigns</button>
            <button id="tab-history" onclick="switchTab('task-history')" class="tab-btn flex-1 py-3 text-sm font-bold text-gray-500 transition-all">Task History</button>
        </div>

        <div id="my-campaigns" class="space-y-4">
            <div class="text-center py-10 text-gray-500 text-sm">Loading your campaigns...</div>
        </div>

        <div id="task-history" class="hidden space-y-4">
            <div class="text-center py-10 text-gray-500 text-sm">Loading history...</div>
        </div>
    </div>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md glass-card rounded-3xl z-50">
        <div class="flex justify-between items-center p-2 px-6">
            <div onclick="window.location.href='index.html'" class="flex flex-col items-center justify-center py-2 opacity-60 hover:opacity-100 cursor-pointer active:scale-95 transition-all text-gray-400">
                <i class="ph-bold ph-house text-2xl mb-1"></i>
                <span class="text-[11px] font-bold">Home</span>
            </div>
            <div onclick="window.location.href='post.html'" class="flex flex-col items-center justify-center py-2 opacity-60 hover:opacity-100 cursor-pointer active:scale-95 transition-all text-gray-400">
                <i class="ph-bold ph-plus-circle text-2xl mb-1"></i>
                <span class="text-[11px] font-bold">Post</span>
            </div>
            <div class="flex flex-col items-center justify-center py-2 relative text-cyan-400">
                <div class="absolute -top-2 w-8 h-1 bg-cyan-400 rounded-b-lg shadow-[0_0_10px_#00F2FE]"></div>
                <i class="ph-fill ph-user text-2xl mb-1 drop-shadow-[0_0_8px_rgba(0,242,254,0.5)]"></i>
                <span class="text-[11px] font-bold">Profile</span>
            </div>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBDeeRAGoprwyOj9RzmcDDu2JEoII6Hn_I",
            authDomain: "whaledrop-2f9ce.firebaseapp.com",
            projectId: "whaledrop-2f9ce",
            storageBucket: "whaledrop-2f9ce.firebasestorage.app",
            messagingSenderId: "509841103423",
            appId: "1:509841103423:web:67d50e6f462b287c64768a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;
        tg.ready();

        const tgUser = tg.initDataUnsafe?.user;
        if(!tgUser) {
            window.location.href = "login.html";
        }

        // Fetch Profile Data
        const userRef = doc(db, "users", String(tgUser.id));
        onSnapshot(userRef, (snap) => {
            if(snap.exists()){
                const data = snap.data();
                document.getElementById('prof-name').innerText = data.first_name;
                document.getElementById('prof-username').innerText = data.username ? '@'+data.username : 'ID: '+data.userId;
                document.getElementById('prof-balance').innerText = Number(data.balance || 0).toLocaleString();
                document.getElementById('prof-level').innerText = data.level || 1;
                document.getElementById('prof-avatar').src = data.photo_url || `https://api.dicebear.com/7.x/initials/svg?seed=${data.first_name}`;
                document.getElementById('profile-body').classList.remove('opacity-0');
                
                loadMyCampaigns();
                loadHistory(data.completedTasks || []);
            }
        });

        // Tab Switching Logic
        window.switchTab = (target) => {
            document.getElementById('my-campaigns').classList.add('hidden');
            document.getElementById('task-history').classList.add('hidden');
            document.getElementById('tab-campaigns').classList.remove('active', 'text-cyan-400');
            document.getElementById('tab-history').classList.remove('active', 'text-cyan-400');
            document.getElementById('tab-campaigns').classList.add('text-gray-500');
            document.getElementById('tab-history').classList.add('text-gray-500');

            document.getElementById(target).classList.remove('hidden');
            const activeTabBtn = target === 'my-campaigns' ? 'tab-campaigns' : 'tab-history';
            document.getElementById(activeTabBtn).classList.add('active', 'text-cyan-400');
            document.getElementById(activeTabBtn).classList.remove('text-gray-500');
            tg.HapticFeedback.impactOccurred('light');
        };

        // Load Campaigns created by this User
        async function loadMyCampaigns() {
            const container = document.getElementById('my-campaigns');
            const q = query(collection(db, "campaigns"), where("ownerId", "==", String(tgUser.id)));
            const snap = await getDocs(q);
            
            container.innerHTML = "";
            if(snap.empty) {
                container.innerHTML = `<div class="glass-card p-8 rounded-2xl text-center text-gray-500 text-sm">You haven't posted any campaigns yet.</div>`;
                return;
            }

            snap.forEach(docSnap => {
                const camp = docSnap.data();
                container.innerHTML += `
                    <div class="glass-card p-4 rounded-2xl flex justify-between items-center">
                        <div class="min-w-0 flex-1">
                            <h3 class="font-bold text-white truncate">${camp.title}</h3>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="px-2 py-0.5 rounded-md bg-cyan-500/10 text-cyan-400 text-[10px] font-bold uppercase tracking-wider">${camp.status}</span>
                                <span class="text-[11px] text-gray-500">${camp.completedCount}/${camp.targetCount} Joined</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-gray-500">Reward</p>
                            <p class="font-bold text-cyan-400">${camp.rewardPerUser} <i class="ph-fill ph-coin text-yellow-400"></i></p>
                        </div>
                    </div>
                `;
            });
        }

        // Load Tasks Completed by this User
        async function loadHistory(completedArray) {
            const container = document.getElementById('task-history');
            container.innerHTML = "";
            
            if(completedArray.length === 0) {
                container.innerHTML = `<div class="glass-card p-8 rounded-2xl text-center text-gray-500 text-sm">No tasks completed yet. Start earning!</div>`;
                return;
            }

            for(const taskId of completedArray.slice().reverse()) {
                const taskRef = doc(db, "campaigns", taskId);
                const taskSnap = await getDoc(taskRef);
                if(taskSnap.exists()) {
                    const task = taskSnap.data();
                    container.innerHTML += `
                        <div class="glass-card p-4 rounded-2xl border-l-4 border-green-500 flex justify-between items-center">
                            <div>
                                <h3 class="font-bold text-white text-sm">${task.title}</h3>
                                <p class="text-[11px] text-gray-500 mt-0.5">Verified Success</p>
                            </div>
                            <div class="flex items-center gap-1 font-extrabold text-green-400">
                                +${task.rewardPerUser} <i class="ph-fill ph-coin text-yellow-400"></i>
                            </div>
                        </div>
                    `;
                }
            }
        }
    </script>
</body>
</html>

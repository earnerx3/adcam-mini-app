<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PromoHub - Create Campaign</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root {
            --bg-color: #05050A;
            --primary: #00F2FE;
            --secondary: #4FACFE;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(79, 172, 254, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(161, 140, 209, 0.08) 0%, transparent 50%);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .text-gradient {
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-field {
            width: 100%;
            background: #0B0F19;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 0.875rem 1rem;
            color: white;
            font-size: 0.875rem;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            outline: none;
            border-color: #00F2FE;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-32 px-5 pt-6 transition-opacity duration-300 opacity-0" id="post-body">

    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-extrabold text-gradient">New Campaign</h1>
            <p class="text-xs text-gray-400 mt-1">Promote your channel to thousands!</p>
        </div>
        <div class="bg-[#0B0F19]/80 border border-white/10 px-3 py-2 rounded-2xl flex items-center gap-1.5 backdrop-blur-md">
            <i class="ph-fill ph-coin text-yellow-400 text-lg drop-shadow-[0_0_8px_rgba(250,204,21,0.5)]"></i>
            <span id="user-balance" class="font-bold text-white text-sm">0</span>
        </div>
    </div>

    <div id="wizard-container" class="space-y-6 relative">
        
        <div id="step-1" class="glass-card p-6 rounded-[2rem] transition-all">
            <div class="text-center mb-5">
                <div class="w-16 h-16 rounded-full bg-gradient-to-tr from-cyan-500/20 to-blue-500/20 flex items-center justify-center mx-auto mb-3">
                    <i class="ph-fill ph-link text-3xl text-cyan-400"></i>
                </div>
                <h2 class="text-lg font-bold text-white mb-1">Target Channel</h2>
                <p class="text-xs text-gray-400">Enter your Telegram channel or group link.</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1.5 ml-1">Channel Username / Link</label>
                    <input type="text" id="channel-input" placeholder="e.g. @MyChannel or t.me/MyChannel" class="input-field">
                </div>
                <button onclick="goToStep2()" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 text-white py-3.5 rounded-2xl font-bold shadow-[0_4px_15px_rgba(0,242,254,0.3)] active:scale-95 transition-all text-sm">
                    Next Step <i class="ph-bold ph-arrow-right ml-1"></i>
                </button>
            </div>
        </div>

        <div id="step-2" class="glass-card p-6 rounded-[2rem] hidden transition-all">
            <div class="text-center mb-5">
                <div class="w-16 h-16 rounded-full bg-gradient-to-tr from-purple-500/20 to-pink-500/20 flex items-center justify-center mx-auto mb-3">
                    <i class="ph-fill ph-shield-check text-3xl text-purple-400"></i>
                </div>
                <h2 class="text-lg font-bold text-white mb-1">Bot Verification</h2>
                <p class="text-xs text-gray-400">To verify joins, our bot must be an Admin.</p>
                <div class="mt-3 bg-purple-500/10 border border-purple-500/30 p-2.5 rounded-xl text-xs text-purple-300 font-medium">
                    Target: <span id="display-target" class="font-bold text-white">@Loading</span>
                </div>
            </div>
            
            <div class="space-y-3">
                <button onclick="openAdminLink()" class="w-full bg-[#0B0F19] border border-cyan-500/40 text-cyan-400 py-3.5 rounded-2xl font-bold active:scale-95 transition-all text-sm flex justify-center items-center gap-2 hover:bg-cyan-500/10">
                    <i class="ph-fill ph-user-plus text-lg"></i> Add @NaHid_HelP1_Bot as Admin
                </button>
                <button id="btn-verify" onclick="verifyAdminStatus()" class="w-full bg-gradient-to-r from-purple-500 to-pink-600 text-white py-3.5 rounded-2xl font-bold shadow-[0_4px_15px_rgba(168,85,247,0.3)] active:scale-95 transition-all text-sm">
                    I have added the Bot (Verify)
                </button>
                <button onclick="backToStep1()" class="w-full text-gray-500 py-2 text-xs font-bold hover:text-white transition-colors">Go Back</button>
            </div>
        </div>

        <div id="step-3" class="glass-card p-6 rounded-[2rem] hidden transition-all">
            <div class="flex items-center justify-between mb-4 pb-4 border-b border-white/5">
                <h2 class="text-lg font-bold text-white">Campaign Details</h2>
                <div class="text-[10px] bg-green-500/20 text-green-400 px-2 py-1 rounded-lg font-bold border border-green-500/30"><i class="ph-fill ph-check-circle"></i> Verified</div>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1.5 ml-1">Campaign Title</label>
                    <input type="text" id="camp-title" placeholder="e.g. Join Official Tech BD" class="input-field mb-3">
                    
                    <label class="block text-xs font-bold text-gray-400 mb-1.5 ml-1">Description</label>
                    <textarea id="camp-desc" rows="2" placeholder="Short description..." class="input-field resize-none"></textarea>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1.5 ml-1">Custom Image (Optional)</label>
                    <div class="relative w-full bg-[#0B0F19] border border-white/10 border-dashed rounded-xl p-4 text-center hover:border-cyan-500/50 transition-colors cursor-pointer" onclick="document.getElementById('image-upload').click()">
                        <input type="file" id="image-upload" accept="image/*" class="hidden" onchange="uploadToImgBB(this)">
                        <div id="upload-placeholder">
                            <i class="ph-fill ph-image text-2xl text-gray-500 mb-1"></i>
                            <p class="text-[10px] text-gray-400">Tap to upload picture</p>
                        </div>
                        <img id="image-preview" src="" class="hidden w-full h-32 object-cover rounded-lg shadow-[0_0_15px_rgba(0,242,254,0.3)]">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 pt-2">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 ml-1">Reward/User</label>
                        <input type="number" id="camp-reward" placeholder="Min 10" class="input-field text-center font-bold text-cyan-400" oninput="calculateTotal()">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 ml-1">Target Users</label>
                        <input type="number" id="camp-target" placeholder="E.g. 500" class="input-field text-center font-bold text-white" oninput="calculateTotal()">
                    </div>
                </div>

                <div class="bg-gradient-to-r from-red-500/10 to-orange-500/10 border border-red-500/20 p-3 rounded-xl flex justify-between items-center mt-2">
                    <span class="text-xs font-bold text-gray-300">Total Cost:</span>
                    <span id="total-cost" class="font-extrabold text-red-400">0 Coins</span>
                </div>

                <button id="btn-submit-campaign" onclick="submitCampaign()" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white py-3.5 rounded-2xl font-bold shadow-[0_4px_15px_rgba(16,185,129,0.3)] active:scale-95 transition-all text-sm mt-4">
                    Publish Campaign 🚀
                </button>
            </div>
        </div>

    </div>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md glass-card rounded-3xl floating-nav z-50">
        <div class="flex justify-between items-center p-2 px-6">
            <div onclick="window.location.href='index.html'" class="flex flex-col items-center justify-center py-2 opacity-60 hover:opacity-100 cursor-pointer active:scale-95 transition-all text-gray-400">
                <i class="ph-bold ph-house text-2xl mb-1"></i>
                <span class="text-[11px] font-bold">Home</span>
            </div>
            <div class="flex flex-col items-center justify-center py-2 relative text-cyan-400">
                <div class="absolute -top-2 w-8 h-1 bg-cyan-400 rounded-b-lg shadow-[0_0_10px_#00F2FE]"></div>
                <i class="ph-fill ph-plus-circle text-2xl mb-1 drop-shadow-[0_0_8px_rgba(0,242,254,0.5)]"></i>
                <span class="text-[11px] font-bold">Post</span>
            </div>
            <div onclick="window.location.href='profile.html'" class="flex flex-col items-center justify-center py-2 opacity-60 hover:opacity-100 cursor-pointer active:scale-95 transition-all text-gray-400">
                <i class="ph-bold ph-user text-2xl mb-1"></i>
                <span class="text-[11px] font-bold">Profile</span>
            </div>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, getDoc, collection, setDoc, serverTimestamp, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBDeeRAGoprwyOj9RzmcDDu2JEoII6Hn_I",
            authDomain: "whaledrop-2f9ce.firebaseapp.com",
            projectId: "whaledrop-2f9ce"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;
        tg.ready();

        let currentUserBalance = 0;
        let finalChannelUsername = "";
        let uploadedImageUrl = "";
        let sysBotToken = "";
        let sysImgbbKey = "";
        let sysBotId = "";

        // 1. Initial Setup & Auth Check
        const tgUser = tg.initDataUnsafe?.user;
        if(!tgUser) window.location.href = "login.html";

        async function initPage() {
            // Load User Balance
            onSnapshot(doc(db, "users", String(tgUser.id)), (snap) => {
                if(snap.exists()) {
                    currentUserBalance = snap.data().balance || 0;
                    document.getElementById('user-balance').innerText = Number(currentUserBalance).toLocaleString();
                    document.getElementById('post-body').classList.remove('opacity-0');
                }
            });

            // Load API Keys from Firestore Config (Hidden from users)
            const configRef = doc(db, "config", "settings");
            const configSnap = await getDoc(configRef);
            if (configSnap.exists()) {
                sysBotToken = configSnap.data().botToken; 
                sysImgbbKey = configSnap.data().imgbbKey;
                // Extract Bot ID from Token (Format: 123456:ABC-DEF)
                sysBotId = sysBotToken.split(':')[0]; 
            } else {
                tg.showAlert("System configuration missing. Contact Admin.");
            }
        }
        initPage();

        // 2. Wizard Logic: Step 1 -> Step 2
        window.goToStep2 = () => {
            const input = document.getElementById('channel-input').value.trim();
            if(!input) return tg.showAlert("Please enter a valid link or username.");
            
            // Clean input to get @username format
            let cleaned = input;
            if (cleaned.includes('t.me/')) cleaned = cleaned.split('t.me/')[1];
            if (!cleaned.startsWith('@')) cleaned = '@' + cleaned;
            
            finalChannelUsername = cleaned;
            document.getElementById('display-target').innerText = finalChannelUsername;
            
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            tg.HapticFeedback.impactOccurred('light');
        };

        window.backToStep1 = () => {
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-1').classList.remove('hidden');
        };

        // 3. Admin Verification using Deep Link
        window.openAdminLink = () => {
            // Your bot username setup for deep linking
            const botUsername = "NaHid_HelP1_Bot";
            const deepLink = `https://t.me/${botUsername}?startchannel=true&admin=post_messages,invite_users`;
            tg.openTelegramLink(deepLink);
        };

        window.verifyAdminStatus = async () => {
            const btn = document.getElementById('btn-verify');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<i class="ph-bold ph-spinner animate-spin text-xl"></i> Checking...`;
            btn.disabled = true;

            try {
                // Call Telegram API to check if Bot is Admin
                const apiUrl = `https://api.telegram.org/bot${sysBotToken}/getChatMember?chat_id=${finalChannelUsername}&user_id=${sysBotId}`;
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.ok && (data.result.status === 'administrator' || data.result.status === 'creator')) {
                    tg.HapticFeedback.notificationOccurred('success');
                    // Move to Step 3
                    document.getElementById('step-2').classList.add('hidden');
                    document.getElementById('step-3').classList.remove('hidden');
                } else {
                    tg.HapticFeedback.notificationOccurred('error');
                    tg.showAlert(`Bot is not an admin in ${finalChannelUsername}.\nPlease add the bot as admin first!`);
                }
            } catch (error) {
                tg.showAlert("Failed to verify channel. Ensure the username is correct and public.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        };

        // 4. ImgBB Upload Logic
        window.uploadToImgBB = async (inputEl) => {
            if(!inputEl.files || !inputEl.files[0]) return;
            if(!sysImgbbKey) return tg.showAlert("Image server configuration missing.");

            const file = inputEl.files[0];
            const formData = new FormData();
            formData.append("image", file);

            document.getElementById('upload-placeholder').innerHTML = `<i class="ph-bold ph-spinner animate-spin text-2xl text-cyan-400 mb-1"></i><p class="text-[10px] text-cyan-400">Uploading...</p>`;

            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${sysImgbbKey}`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                if(data.success) {
                    uploadedImageUrl = data.data.url;
                    // Show Preview with Neon Glow
                    document.getElementById('upload-placeholder').classList.add('hidden');
                    const preview = document.getElementById('image-preview');
                    preview.src = uploadedImageUrl;
                    preview.classList.remove('hidden');
                    tg.HapticFeedback.impactOccurred('light');
                } else {
                    throw new Error("Upload failed");
                }
            } catch (error) {
                tg.showAlert("Failed to upload image. Please try again.");
                document.getElementById('upload-placeholder').innerHTML = `<i class="ph-fill ph-image text-2xl text-gray-500 mb-1"></i><p class="text-[10px] text-gray-400">Tap to upload picture</p>`;
            }
        };

        // 5. Calculate Cost
        window.calculateTotal = () => {
            const reward = parseInt(document.getElementById('camp-reward').value) || 0;
            const target = parseInt(document.getElementById('camp-target').value) || 0;
            const total = reward * target;
            document.getElementById('total-cost').innerText = `${total.toLocaleString()} Coins`;
        };

        // 6. Final Submit Logic (Transaction)
        window.submitCampaign = async () => {
            const title = document.getElementById('camp-title').value.trim();
            const desc = document.getElementById('camp-desc').value.trim();
            const reward = parseInt(document.getElementById('camp-reward').value);
            const target = parseInt(document.getElementById('camp-target').value);
            const totalCost = reward * target;

            if(!title || !desc || !reward || !target) return tg.showAlert("Please fill all fields.");
            if(reward < 10) return tg.showAlert("Reward per user must be at least 10.");
            if(target < 5) return tg.showAlert("Target must be at least 5 users.");
            if(totalCost > currentUserBalance) return tg.showAlert(`Insufficient balance! You need ${totalCost.toLocaleString()} Coins.`);

            const btn = document.getElementById('btn-submit-campaign');
            btn.innerHTML = `<i class="ph-bold ph-spinner animate-spin text-xl"></i> Publishing...`;
            btn.disabled = true;

            try {
                const userRef = doc(db, "users", String(tgUser.id));
                const campRef = doc(collection(db, "campaigns")); // Generate new ID

                await runTransaction(db, async (transaction) => {
                    // Check balance securely again
                    const userDoc = await transaction.get(userRef);
                    if (userDoc.data().balance < totalCost) {
                        throw new Error("Insufficient Funds");
                    }

                    // 1. Deduct Balance
                    transaction.update(userRef, {
                        balance: userDoc.data().balance - totalCost
                    });

                    // 2. Create Campaign
                    transaction.set(campRef, {
                        title: title,
                        description: desc,
                        customImage: uploadedImageUrl,
                        channelUsername: finalChannelUsername,
                        rewardPerUser: reward,
                        targetCount: target,
                        completedCount: 0,
                        totalCost: totalCost,
                        status: "active",
                        ownerId: String(tgUser.id),
                        createdAt: serverTimestamp()
                    });
                });

                tg.HapticFeedback.notificationOccurred('success');
                tg.showAlert("Campaign Published Successfully! 🎉");
                window.location.href = "profile.html"; // Redirect to profile to see the campaign

            } catch (error) {
                tg.showAlert("Transaction Failed: " + error.message);
                btn.innerHTML = `Publish Campaign 🚀`;
                btn.disabled = false;
            }
        };

    </script>
</body>
</html>

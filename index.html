<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PromoHub - Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root {
            --bg-color: #05050A;
            --primary: #00F2FE;
            --secondary: #4FACFE;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(79, 172, 254, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(161, 140, 209, 0.08) 0%, transparent 50%);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .text-gradient {
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text-gradient-primary {
            background: linear-gradient(135deg, #00F2FE 0%, #4FACFE 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-glow {
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
            transition: all 0.2s ease-in-out;
        }

        ::-webkit-scrollbar { display: none; }

        .floating-nav {
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }

        /* Image Custom Glow Effects */
        .glow-purple { box-shadow: 0 0 15px rgba(147, 51, 234, 0.4); }
        .glow-cyan { box-shadow: 0 0 15px rgba(0, 242, 254, 0.4); }
        .glow-orange { box-shadow: 0 0 15px rgba(249, 115, 22, 0.4); }
    </style>
</head>
<body class="pb-28 px-5 pt-6 opacity-0 transition-opacity duration-500" id="main-body">

    <header class="glass-card rounded-3xl p-4 mb-6 flex justify-between items-center relative overflow-hidden gap-3">
        <div class="absolute top-0 left-0 w-full h-1/2 bg-gradient-to-b from-white/5 to-transparent"></div>
        
        <div class="relative z-10 flex items-center gap-2.5 min-w-0 flex-1">
            <div class="w-10 h-10 flex-shrink-0 rounded-full bg-gradient-to-tr from-indigo-500 to-cyan-400 p-[1px]">
                <img id="user-avatar" src="" alt="User" class="w-full h-full rounded-full bg-[#05050A] object-cover">
            </div>
            <div class="min-w-0 flex-1"> 
                <h1 id="user-name" class="text-lg font-extrabold text-gradient truncate block">Loading...</h1>
                <div class="flex items-center gap-1 mt-0.5 text-xs text-gray-400 font-medium truncate block">
                    <i class="ph-fill ph-star text-yellow-500 flex-shrink-0"></i>
                    <span id="user-level" class="truncate">Member</span>
                </div>
            </div>
        </div>
        
        <div class="relative z-10 bg-[#0B0F19]/80 border border-white/10 px-3 py-2 rounded-2xl flex items-center gap-1.5 backdrop-blur-md flex-shrink-0">
            <i class="ph-fill ph-coin text-yellow-400 text-xl drop-shadow-[0_0_8px_rgba(250,204,21,0.5)]"></i>
            <span id="user-balance" class="font-bold text-white text-base tracking-wide">0</span>
        </div>
    </header>

    <section>
        <div class="flex justify-between items-end mb-4">
            <h2 class="text-xl font-bold flex items-center gap-2">
                <i class="ph-fill ph-fire text-orange-500 text-2xl drop-shadow-[0_0_10px_rgba(249,115,22,0.4)]"></i> 
                Active Tasks
            </h2>
        </div>

        <div id="task-list" class="space-y-3.5">
            <div class="text-center text-gray-500 text-sm py-4">Loading tasks...</div>
        </div>
    </section>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md glass-card rounded-3xl floating-nav z-50">
        <div class="flex justify-between items-center p-2 px-6">
            <div class="flex flex-col items-center justify-center py-2 relative cursor-pointer text-cyan-400">
                <div class="absolute -top-2 w-8 h-1 bg-cyan-400 rounded-b-lg shadow-[0_0_10px_#00F2FE]"></div>
                <i class="ph-fill ph-house text-2xl mb-1 drop-shadow-[0_0_8px_rgba(0,242,254,0.5)]"></i>
                <span class="text-[11px] font-bold">Home</span>
            </div>
            <div onclick="window.location.href='post.html'" class="flex flex-col items-center justify-center py-2 opacity-60 hover:opacity-100 cursor-pointer active:scale-95 transition-all text-gray-400">
                <i class="ph-bold ph-plus-circle text-2xl mb-1"></i>
                <span class="text-[11px] font-bold">Post</span>
            </div>
            <div onclick="window.location.href='profile.html'" class="flex flex-col items-center justify-center py-2 opacity-60 hover:opacity-100 cursor-pointer active:scale-95 transition-all text-gray-400">
                <i class="ph-bold ph-user text-2xl mb-1"></i>
                <span class="text-[11px] font-bold">Profile</span>
            </div>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, onSnapshot, updateDoc, increment, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBDeeRAGoprwyOj9RzmcDDu2JEoII6Hn_I",
            authDomain: "whaledrop-2f9ce.firebaseapp.com",
            projectId: "whaledrop-2f9ce",
            storageBucket: "whaledrop-2f9ce.firebasestorage.app",
            messagingSenderId: "509841103423",
            appId: "1:509841103423:web:67d50e6f462b287c64768a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;
        tg.ready();

        let botToken = "";
        let currentUserData = null;

        async function initApp() {
            const tgUser = tg.initDataUnsafe?.user;
            if (!tgUser) {
                window.location.href = "login.html";
                return;
            }

            // Fetch Bot Token from secure config
            const configRef = doc(db, "config", "settings");
            const configSnap = await getDoc(configRef);
            if(configSnap.exists()) {
                botToken = configSnap.data().botToken;
            }

            // Real-time User Data Fetching
            const userRef = doc(db, "users", String(tgUser.id));
            onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    currentUserData = docSnap.data();
                    document.getElementById('user-name').innerText = currentUserData.first_name;
                    document.getElementById('user-balance').innerText = Number(currentUserData.balance || 0).toLocaleString();
                    document.getElementById('user-avatar').src = currentUserData.photo_url || `https://api.dicebear.com/7.x/initials/svg?seed=${currentUserData.first_name}&backgroundColor=00F2FE`;
                    document.getElementById('main-body').classList.remove('opacity-0');
                    
                    loadTasks(); 
                } else {
                    window.location.href = "login.html";
                }
            });
        }

        function loadTasks() {
            const taskListEl = document.getElementById('task-list');
            const q = query(collection(db, "campaigns"), where("status", "==", "active"));
            
            onSnapshot(q, (snapshot) => {
                taskListEl.innerHTML = "";
                if(snapshot.empty) {
                    taskListEl.innerHTML = `<div class="text-center text-gray-500 text-sm py-4">No active tasks available right now.</div>`;
                    return;
                }

                snapshot.forEach((docSnap) => {
                    const task = docSnap.data();
                    const taskId = docSnap.id;
                    
                    // Hide if user already completed this task
                    const isCompleted = currentUserData.completedTasks && currentUserData.completedTasks.includes(taskId);
                    if(isCompleted) return; 

                    let mediaHtml = '';
                    if (task.customImage) {
                        mediaHtml = `<img src="${task.customImage}" class="w-full h-full rounded-xl object-cover glow-cyan">`;
                    } else {
                        mediaHtml = `<div class="w-full h-full bg-[#0B0F19] rounded-xl flex items-center justify-center glow-purple">
                                        <i class="ph-fill ph-telegram-logo text-2xl text-gradient-primary"></i>
                                     </div>`;
                    }

                    const taskCard = document.createElement('div');
                    // Go to Details Page when clicked on the card body
                    taskCard.className = "glass-card p-3 rounded-2xl flex items-center justify-between gap-3 group cursor-pointer active:scale-[0.98]";
                    taskCard.onclick = () => window.location.href = `task_details.html?id=${taskId}`;
                    
                    taskCard.innerHTML = `
                        <div class="flex items-center gap-3 min-w-0 flex-1">
                            <div class="relative w-11 h-11 flex-shrink-0 rounded-xl bg-gradient-to-tr from-purple-600 to-blue-500 p-[1px]">
                                ${mediaHtml}
                            </div>
                            <div class="min-w-0 flex-1">
                                <h3 class="font-bold text-sm text-white group-hover:text-cyan-400 transition-colors truncate">${task.title}</h3>
                                <p class="text-xs text-gray-400 mt-1 truncate">${task.description}</p>
                            </div>
                        </div>
                        <button id="btn-${taskId}" onclick="verifyAndClaim(event, '${taskId}', '${task.channelUsername}', ${task.rewardPerUser})" class="bg-[#0B0F19] border border-cyan-500/30 text-cyan-400 px-3.5 py-2.5 rounded-2xl text-sm font-bold hover:bg-cyan-500 hover:text-white transition-all btn-glow flex items-center gap-1">
                            +${task.rewardPerUser} <i class="ph-fill ph-coin text-yellow-400"></i>
                        </button>
                    `;
                    taskListEl.appendChild(taskCard);
                });
                
                if(taskListEl.innerHTML === "") {
                    taskListEl.innerHTML = `<div class="text-center text-gray-500 text-sm py-4">You have completed all available tasks!</div>`;
                }
            });
        }

        // --- 100% SECURE VERIFICATION LOGIC ---
        window.verifyAndClaim = async function(event, taskId, channelUsername, rewardAmount) {
            event.stopPropagation(); // Stop clicking to details page
            const btn = document.getElementById(`btn-${taskId}`);
            const originalBtnHtml = btn.innerHTML;
            
            // 1. Clean the username perfectly (Removes t.me/, @, or query params)
            let cleanUsername = channelUsername;
            if (cleanUsername.includes('t.me/')) cleanUsername = cleanUsername.split('t.me/')[1];
            if (cleanUsername.includes('telegram.me/')) cleanUsername = cleanUsername.split('telegram.me/')[1];
            cleanUsername = cleanUsername.replace('@', '').split('?')[0]; 

            btn.innerHTML = `<i class="ph-bold ph-spinner animate-spin text-lg"></i>`;
            btn.disabled = true;

            try {
                if(!botToken) throw new Error("Bot Token is missing in server configuration.");

                const tgUserId = tg.initDataUnsafe.user.id;
                // Add timestamp to prevent browser caching the previous Telegram API response
                const apiUrl = `https://api.telegram.org/bot${botToken}/getChatMember?chat_id=@${cleanUsername}&user_id=${tgUserId}&t=${new Date().getTime()}`;
                
                // Fetch with no-store to force real-time check
                const response = await fetch(apiUrl, { cache: 'no-store' });
                const data = await response.json();

                if (data.ok) {
                    const status = data.result.status;
                    
                    // Check if the user is truly in the channel
                    if (status === 'member' || status === 'administrator' || status === 'creator' || status === 'restricted') {
                        
                        const userRef = doc(db, "users", String(tgUserId));
                        const campaignRef = doc(db, "campaigns", taskId);

                        // Give balance & add to completed list
                        await updateDoc(userRef, {
                            balance: increment(rewardAmount),
                            completedTasks: arrayUnion(taskId)
                        });

                        await updateDoc(campaignRef, {
                            completedCount: increment(1)
                        });

                        tg.HapticFeedback.notificationOccurred('success');
                        tg.showAlert(`🎉 Success! ${rewardAmount} Coins added to your balance.`);
                        
                        // Hide the task immediately from screen
                        const taskCard = btn.closest('.glass-card');
                        if(taskCard) taskCard.style.display = 'none';

                    } else {
                        // User has left or been kicked
                        tg.HapticFeedback.notificationOccurred('error');
                        tg.showAlert(`⚠️ You haven't joined the channel yet!\n\nPlease join @${cleanUsername} to claim your coins.`);
                        btn.innerHTML = originalBtnHtml;
                        btn.disabled = false;
                    }
                } else {
                    // API Call failed (e.g. Bot is not admin in the target channel)
                    tg.HapticFeedback.notificationOccurred('error');
                    console.log("Telegram Error:", data.description);
                    if (data.description.includes('chat not found')) {
                        tg.showAlert(`❌ Bot is not an Admin in @${cleanUsername}. Reward cannot be claimed right now.`);
                    } else {
                        tg.showAlert(`⚠️ Error: ${data.description}`);
                    }
                    btn.innerHTML = originalBtnHtml;
                    btn.disabled = false;
                }
            } catch (error) {
                console.error("Verification Error:", error);
                tg.showAlert("Network error while checking status. Please try again.");
                btn.innerHTML = originalBtnHtml;
                btn.disabled = false;
            }
        };

        initApp();
    </script>
</body>
</html>
